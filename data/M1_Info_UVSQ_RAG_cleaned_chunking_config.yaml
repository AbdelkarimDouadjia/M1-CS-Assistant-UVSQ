chunk_size: 500
chunk_overlap: 100
separators:
  - '\n\n(?=[A-ZÉÀÈÙÔÎÂÊÛÏÖÜÇ][^\n]{10,}\n\n)' # Séparateur de titres de sections principales (ex: "Contacts principaux", "Calendrier universitaire Semestre 1 (2025-2026)")
  - '\n(?=[A-ZÉÀÈÙÔÎÂÊÛÏÖÜÇ][^\n]* :\n)' # Séparateur de sous-sections (ex: "Secrétariat pédagogique :")
  - '\n(?=[A-ZÉÀÈÙÔÎÂÊÛÏÖÜÇ][^\n]* : )' # Séparateur d'éléments de liste avec titre (ex: "Master AMIS :", "Complément de Maths Discrètes (MIN17101) :", "Accueil étudiant :")
  - '\n\n' # Double saut de ligne (paragraphe)
  - '\n' # Saut de ligne simple
  - '\. ' # Fin de phrase avec point
  - '\? ' # Fin de phrase avec point d'interrogation
  - '! ' # Fin de phrase avec point d'exclamation
  - '; ' # Point-virgule
  - ': ' # Deux-points
  - ', ' # Virgule
  - ' ' # Espace (séparateur de mots)
  - '' # Séparateur par caractère (dernier recours)
is_separator_regex: true