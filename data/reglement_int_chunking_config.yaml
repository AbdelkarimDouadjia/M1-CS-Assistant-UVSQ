chunk_size: 1000
chunk_overlap: 200
separators:
  - '\n\nTITRE \d+ – [^\n]*\n\n'
  - '\n\nPREAMBULE\n'
  - '\n\nArticle \d+\.\d+\. [^\n]*\n'
  - '\n\nArticle \d+[a-z]\. \n'
  - '\n\nArticle \d+[a-z]\n'
  - '\n\nArticle \d+\. [^\n]*\n'
  - '\n\nArticle \d+ – [^\n]*\n'
  - '\n\nArticle \d+ :\n'
  - '\n\nArticle \d+ [^\n]*\n'
  - '\n\nArticle \d+\n'
  - '\n\s* '
  - '\n\s*-\s'
  - '\n\n'
  - '\n'
  - '(?<=\. )'
  - '(?<=\? )'
  - '(?<=! )'
  - '(?<=; )'
  - '(?<=: )'
  - '(?<=, )'
  - ' '
  - ''
is_separator_regex: true